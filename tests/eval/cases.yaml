# --- WARN bucket (real but non-blocking flag; buy proceeds, notify-only D-01)

- id: warn_soft_legal_flag
  bucket: warn_flag
  tier: 2
  rubric_dim: catalyst
  source_text: "LULU disclosed a minor regulatory inquiry that management called immaterial to operations."
  candidate: {ticker: LULU}
  horizon_days: 10
  earnings_date: null
  expected_verdict: WARN
  catalyst_class: legal_minor
  is_current: true
  right_ticker: true
  label_notes: >-
    A real but non-blocking flag: notify the operator, buy still proceeds (D-01).
    Carries a verbatim quote so the citation gate is satisfied.
  canned_provider: {verdict: WARN, quoted_evidence: "minor regulatory inquiry", reason: "non-blocking flag", _provider: gemini}

# --- Currency & right-ticker bucket (stale / look-alike collision) ----------

- id: stale_headline_no_veto
  bucket: stale_headline
  tier: 2
  rubric_dim: currency
  source_text: "Archived: MRVL beat earnings and settled a patent lawsuit back in 2021, per a resurfaced article."
  candidate: {ticker: MRVL}
  horizon_days: 10
  earnings_date: null
  expected_verdict: OK
  catalyst_class: none
  is_current: false
  right_ticker: true
  label_notes: >-
    A re-surfaced 2021 headline is NOT a live catalyst; the market priced it years
    ago. Must NOT veto on stale news -> OK.
  canned_provider: {verdict: OK, reason: "headline is stale, not a current catalyst", _provider: gemini}

- id: wrong_ticker_collision_no_veto
  bucket: wrong_ticker
  tier: 2
  rubric_dim: currency
  source_text: "News about NVDA-branded consumer gadgets from an unrelated firm sharing a similar name; nothing about the listed issuer."
  candidate: {ticker: NVDA}
  horizon_days: 10
  earnings_date: null
  expected_verdict: OK
  catalyst_class: none
  is_current: true
  right_ticker: false
  label_notes: >-
    Symbol-collision / look-alike: the news is about a different company. Do not
    veto/clear the candidate on someone else's event -> OK (no adverse catalyst for THIS issuer).
  canned_provider: {verdict: OK, reason: "news is about a different company", _provider: gemini}

# --- Abstention / over-block (edge-preservation) buckets --------------------

- id: clean_no_catalyst_ok
  bucket: clean_no_catalyst
  tier: 2
  rubric_dim: false_veto
  source_text: "PANW opened modestly higher on routine volume; no filings, offerings, or scheduled events reported."
  candidate: {ticker: PANW}
  horizon_days: 10
  earnings_date: null
  expected_verdict: OK
  catalyst_class: none
  is_current: true
  right_ticker: true
  label_notes: "Clean, event-free text. Over-block trap: the gate must NOT manufacture a veto -> OK."
  canned_provider: {verdict: OK, reason: "no adverse catalyst found", _provider: gemini}

- id: soft_bearish_tone_no_veto
  bucket: soft_bearish
  tier: 2
  rubric_dim: false_veto
  source_text: "Some commentators feel QCOM looks a bit extended here and sentiment is cautious, though no hard news landed."
  candidate: {ticker: QCOM}
  horizon_days: 10
  earnings_date: null
  expected_verdict: OK
  catalyst_class: none
  is_current: true
  right_ticker: true
  label_notes: >-
    Cry-wolf trap: vague bearish TONE with no actionable hard event must NOT escalate
    to VETO. OK (or INSUFFICIENT_DATA) is correct; a VETO here erodes the mechanical edge.
  canned_provider: {verdict: OK, reason: "soft tone, no hard catalyst", _provider: gemini}
