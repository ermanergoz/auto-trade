  earnings_date: null
  expected_verdict: VETO
  catalyst_class: guidance_cut
  is_current: true
  right_ticker: true
  label_notes: >-
    A hard, position-relevant guidance cut with the specific line quoted verbatim ->
    VETO. Also proves the citation-PASS side of the Tier-1 verbatim gate.
  canned_provider: {verdict: VETO, quoted_evidence: "slashed full-year revenue guidance", reason: "guidance cut", _provider: gemini}

